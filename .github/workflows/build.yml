name: Build unforzed

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

env:
  SDK_VERSION: "9.1.0"
  SDK_ASSET: "ciq-sdk-9.1.0.zip"
  SDK_RELEASE_TAG: "sdk-assets"

jobs:
  build:
    runs-on: macos-latest

    steps:
      # ── 1. Código ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java ─────────────────────────────────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── 3. SDK desde GitHub Release (cacheado por versión) ─────────────────
      - name: Cache SDK
        uses: actions/cache@v4
        id: sdk-cache
        with:
          path: ~/ciq-sdk
          key: ciq-sdk-mac-${{ env.SDK_VERSION }}

      - name: Download SDK from release
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/ciq-sdk
          curl -L \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${{ github.repository }}/releases/assets/406942940" \
            -o /tmp/sdk.zip
          unzip -q /tmp/sdk.zip -d ~/ciq-sdk
          chmod -R 755 ~/ciq-sdk
          echo "--- zip entries con Devices ---"
          unzip -l /tmp/sdk.zip | grep -E "Devices/" | head -20 || echo "NO Devices en el zip"

      - name: Verify monkeyc
        run: |
          MONKEYC=$(ls ~/ciq-sdk/Sdks/*/bin/monkeyc)
          SDK_BIN=$(dirname $MONKEYC)
          echo "monkeyc: $MONKEYC"
          $MONKEYC --version
          echo "--- bin/ contents ---"
          ls $SDK_BIN/
          echo "--- devices en projectInfo.xml ---"
          grep -o 'id="[^"]*"' $SDK_BIN/projectInfo.xml | grep -i "fenix8\|instinct" | head -20 || echo "no matches"

      # ── 4. Developer key ────────────────────────────────────────────────────
      - name: Setup developer key
        run: |
          echo "${{ secrets.DEVELOPER_KEY_B64 }}" | base64 -d \
            > garmin-app/developer_key.der

      # ── 5a. Push / PR → compila fr265 como validación ──────────────────────
      - name: Build fr265 (validation)
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        run: |
          mkdir -p garmin-app/build
          SDK_BIN=$(dirname $(ls ~/ciq-sdk/Sdks/*/bin/monkeyc))
          ~/ciq-sdk/Sdks/*/bin/monkeyc \
            -f garmin-app/monkey.jungle \
            -o garmin-app/build/unforzed_fenix8pro47mm.prg \
            -d fenix8pro47mm \
            -y garmin-app/developer_key.der \
            -a $SDK_BIN/api.db \
            -b $SDK_BIN/api.mir \
            -p $SDK_BIN/projectInfo.xml

      - name: Upload validation artifact
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: unforzed-fenix8pro47mm-${{ github.sha }}
          path: garmin-app/build/unforzed_fenix8pro47mm.prg
          retention-days: 7

      # ── 5b. Release → compila los 15 targets ────────────────────────────────
      - name: Build all targets (release)
        if: github.event_name == 'release'
        run: |
          mkdir -p garmin-app/build
          for DEVICE in \
            fenix843mm fenix847mm fenix8pro47mm fenix8solar47mm fenix8solar51mm \
            instinct2 instinct2s instinct2x \
            instinct3amoled45mm instinct3amoled50mm instinct3solar45mm; do
            echo "▸ Building $DEVICE..."
            ~/ciq-sdk/Sdks/*/bin/monkeyc \
              -f garmin-app/monkey.jungle \
              -o garmin-app/build/unforzed_${DEVICE}.iq \
              -d $DEVICE \
              -y garmin-app/developer_key.der \
              --release
          done

      - name: Upload release artifacts
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: unforzed-${{ github.ref_name }}-all-devices
          path: garmin-app/build/*.iq
          retention-days: 90

      - name: Attach .iq to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: garmin-app/build/*.iq
