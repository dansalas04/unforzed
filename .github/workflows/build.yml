name: Build unforzed

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

env:
  SDK_VERSION: "9.1.0"
  SDK_ASSET: "ciq-sdk-9.1.0.zip"
  SDK_RELEASE_TAG: "sdk-assets"

jobs:
  build:
    runs-on: macos-latest

    steps:
      # ── 1. Código ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java ─────────────────────────────────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── 3. SDK desde GitHub Release (cacheado por versión) ─────────────────
      - name: Cache SDK
        uses: actions/cache@v4
        id: sdk-cache
        with:
          path: ~/ciq-sdk
          key: ciq-sdk-mac-${{ env.SDK_VERSION }}

      - name: Download SDK from release
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/ciq-sdk
          curl -L \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${{ github.repository }}/releases/assets/406920429" \
            -o /tmp/sdk.zip
          unzip -q /tmp/sdk.zip -d ~/ciq-sdk
          chmod +x ~/ciq-sdk/*/bin/monkeyc

      - name: Verify monkeyc
        run: |
          SDK_DIR=$(ls ~/ciq-sdk | head -1)
          echo "SDK dir: $SDK_DIR"
          ls ~/ciq-sdk/$SDK_DIR/
          ~/ciq-sdk/$SDK_DIR/bin/monkeyc --version
          # List available device IDs
          ls ~/ciq-sdk/$SDK_DIR/devices/ 2>/dev/null | head -20 || \
          ls ~/ciq-sdk/$SDK_DIR/bin/../devices/ 2>/dev/null | head -20 || \
          find ~/ciq-sdk/$SDK_DIR -name "devices.xml" 2>/dev/null | head -5

      # ── 4. Developer key ────────────────────────────────────────────────────
      - name: Setup developer key
        run: |
          echo "${{ secrets.DEVELOPER_KEY_B64 }}" | base64 -d \
            > garmin-app/developer_key.der

      # ── 5a. Push / PR → compila fr265 como validación ──────────────────────
      - name: Build fr265 (validation)
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        run: |
          mkdir -p garmin-app/build
          ~/ciq-sdk/*/bin/monkeyc \
            -f garmin-app/monkey.jungle \
            -o garmin-app/build/unforzed_fr265.prg \
            -d fr265 \
            -y garmin-app/developer_key.der

      - name: Upload validation artifact
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: unforzed-fr265-${{ github.sha }}
          path: garmin-app/build/unforzed_fr265.prg
          retention-days: 7

      # ── 5b. Release → compila los 15 targets ────────────────────────────────
      - name: Build all targets (release)
        if: github.event_name == 'release'
        run: |
          mkdir -p garmin-app/build
          for DEVICE in fr255 fr255s fr255m fr255sm fr265 fr265s \
                        fenix7 fenix7s fenix7x fenix7pro fenix7xpro \
                        venu2 venu2s venu3 venu3s; do
            echo "▸ Building $DEVICE..."
            ~/ciq-sdk/*/bin/monkeyc \
              -f garmin-app/monkey.jungle \
              -o garmin-app/build/unforzed_${DEVICE}.iq \
              -d $DEVICE \
              -y garmin-app/developer_key.der \
              --release
          done

      - name: Upload release artifacts
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: unforzed-${{ github.ref_name }}-all-devices
          path: garmin-app/build/*.iq
          retention-days: 90

      - name: Attach .iq to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: garmin-app/build/*.iq
